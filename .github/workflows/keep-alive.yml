name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.API_URL }}/health)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "API returned $STATUS"
            exit 1
          fi
